components:
  parameters:
    XTenantID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        db:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        display_name:
          type: string
    RegisterResponse:
      type: object
      required: [user_id, tenant_id]
      properties:
        user_id:
          type: string
        tenant_id:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
    MeResponse:
      type: object
      required: [user_id, email, display_name, platform_role, tenants]
      properties:
        user_id:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        platform_role:
          type: string
          enum: [user, superadmin]
        tenants:
          type: array
          items:
            $ref: "#/components/schemas/Tenant"
    Tenant:
      type: object
      required: [id, name, is_active]
      properties:
        id:
          type: string
        name:
          type: string
        is_active:
          type: boolean
    AdminCreateTenantRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    AdminUpdateTenantRequest:
      type: object
      properties:
        name:
          type: string
        is_active:
          type: boolean

    # ---- Event schemas ----
    IngestEventRequest:
      type: object
      required: [event_id, event_name, event_time]
      properties:
        event_id:
          type: string
        event_name:
          type: string
        session_id:
          type: string
        properties:
          type: object
          additionalProperties: true
        event_time:
          type: string
          format: date-time
    IngestEventResponse:
      type: object
      required: [event_id, status]
      properties:
        event_id:
          type: string
        status:
          type: string
          enum: [accepted]

    # ---- Event summary schemas ----
    EventsSummaryResponse:
      type: object
      required: [counts, total]
      properties:
        counts:
          type: array
          items:
            $ref: "#/components/schemas/EventCount"
        total:
          type: integer
          format: int64
    EventCount:
      type: object
      required: [event_name, count]
      properties:
        event_name:
          type: string
        count:
          type: integer
          format: int64

    # ---- Job schemas ----
    JobKind:
      type: string
      enum: [pipeline, transform, import, export]
    Job:
      type: object
      required: [id, tenant_id, name, slug, is_active, kind]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        kind:
          $ref: "#/components/schemas/JobKind"
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateJobRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        kind:
          $ref: "#/components/schemas/JobKind"
    UpdateJobRequest:
      type: object
      required: [name, slug, is_active]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        is_active:
          type: boolean

    # ---- Job Version schemas ----
    JobVersion:
      type: object
      required: [id, tenant_id, job_id, version, status]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        job_id:
          type: string
        version:
          type: integer
        status:
          type: string
          enum: [draft, published]
        published_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    JobVersionDetail:
      type: object
      required: [version, modules, edges]
      properties:
        version:
          $ref: "#/components/schemas/JobVersion"
        modules:
          type: array
          items:
            $ref: "#/components/schemas/JobModule"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/JobModuleEdge"
    CreateJobVersionRequest:
      type: object
      required: [modules]
      properties:
        modules:
          type: array
          items:
            $ref: "#/components/schemas/CreateJobModuleInput"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/CreateEdgeInput"
    CreateJobModuleInput:
      type: object
      required: [module_type_id, name]
      properties:
        module_type_id:
          type: string
        module_type_schema_id:
          type: string
        connection_id:
          type: string
        name:
          type: string
        config_json:
          type: string
        position_x:
          type: number
        position_y:
          type: number
    CreateEdgeInput:
      type: object
      required: [source_module_index, target_module_index]
      properties:
        source_module_index:
          type: integer
        target_module_index:
          type: integer

    # ---- Job Module schemas ----
    JobModule:
      type: object
      required: [id, tenant_id, job_version_id, module_type_id, name]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        job_version_id:
          type: string
        module_type_id:
          type: string
        module_type_schema_id:
          type: string
        connection_id:
          type: string
        name:
          type: string
        config_json:
          type: string
        position_x:
          type: number
        position_y:
          type: number
    JobModuleEdge:
      type: object
      required: [id, tenant_id, job_version_id, source_module_id, target_module_id]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        job_version_id:
          type: string
        source_module_id:
          type: string
        target_module_id:
          type: string

    # ---- Job Run schemas ----
    CreateJobRunRequest:
      type: object
      required: [job_id]
      properties:
        job_id:
          type: string
        job_version_id:
          type: string
    JobRun:
      type: object
      required: [id, tenant_id, job_id, status]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        job_id:
          type: string
        job_version_id:
          type: string
        status:
          $ref: "#/components/schemas/JobRunStatus"
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
    JobRunStatus:
      type: string
      enum: [queued, running, success, failed, canceled]

    # ---- Job Run Module schemas ----
    JobRunModule:
      type: object
      required: [id, tenant_id, job_run_id, job_module_id, status, attempt]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        job_run_id:
          type: string
        job_module_id:
          type: string
        status:
          $ref: "#/components/schemas/JobRunModuleStatus"
        attempt:
          type: integer
        input_json:
          type: string
        output_json:
          type: string
        metrics_json:
          type: string
        error_code:
          type: string
        error_message:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    JobRunModuleStatus:
      type: string
      enum: [queued, running, success, failed, canceled]

    # ---- Job Run Artifact schemas ----
    JobRunArtifact:
      type: object
      required: [id, tenant_id, job_run_id, name, artifact_type, storage_type, storage_path, size_bytes, content_type]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        job_run_id:
          type: string
        job_run_module_id:
          type: string
        name:
          type: string
        artifact_type:
          type: string
        storage_type:
          type: string
        storage_path:
          type: string
        uri:
          type: string
        size_bytes:
          type: integer
          format: int64
        content_type:
          type: string
        checksum:
          type: string
        metadata_json:
          type: string
        created_at:
          type: string
          format: date-time

    # ---- Module Type schemas ----
    ModuleType:
      type: object
      required: [id, tenant_id, name, category]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        category:
          type: string
          enum: [source, transform, destination]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateModuleTypeRequest:
      type: object
      required: [name, category]
      properties:
        name:
          type: string
        category:
          type: string
          enum: [source, transform, destination]
    ModuleTypeSchema:
      type: object
      required: [id, tenant_id, module_type_id, version, json_schema]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        module_type_id:
          type: string
        version:
          type: integer
        json_schema:
          type: string
        created_at:
          type: string
          format: date-time
    CreateModuleTypeSchemaRequest:
      type: object
      required: [json_schema]
      properties:
        json_schema:
          type: string

    # ---- Connection schemas ----
    Connection:
      type: object
      required: [id, tenant_id, name, type]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        type:
          type: string
        config_json:
          type: string
        secret_ref:
          type: string
        credential_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateConnectionRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
        config_json:
          type: string
        secret_ref:
          type: string
        credential_id:
          type: string
    UpdateConnectionRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
        config_json:
          type: string
        secret_ref:
          type: string
        credential_id:
          type: string
    TestConnectionRequest:
      type: object
      required: [type, config_json]
      properties:
        type:
          type: string
        config_json:
          type: string
        credential_id:
          type: string
    TestConnectionResponse:
      type: object
      required: [validation, connectivity]
      properties:
        validation:
          $ref: "#/components/schemas/ValidationResult"
        connectivity:
          $ref: "#/components/schemas/ConnectivityResult"
    ValidationResult:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, failed]
        message:
          type: string
    ConnectivityResult:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, failed, skipped]
        message:
          type: string
        code:
          type: string

    # ---- Connector schemas ----
    ConnectorKind:
      type: string
      enum: [source, destination]
    ConnectorDefinition:
      type: object
      required: [id, name, kind, capabilities]
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          $ref: "#/components/schemas/ConnectorKind"
        icon:
          type: string
        description:
          type: string
        capabilities:
          type: array
          items:
            type: string
          description: Supported capabilities (testable, fetchable, importable)
    ConnectorDefinitionDetail:
      type: object
      required: [id, name, kind, spec, capabilities]
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          $ref: "#/components/schemas/ConnectorKind"
        icon:
          type: string
        description:
          type: string
        credential_provider:
          type: string
        capabilities:
          type: array
          items:
            type: string
          description: Supported capabilities (testable, fetchable, importable)
        spec:
          type: object

    # ---- Credential schemas ----
    Credential:
      type: object
      required: [id, user_id, tenant_id, provider]
      properties:
        id:
          type: string
        user_id:
          type: string
        tenant_id:
          type: string
        provider:
          type: string
        provider_label:
          type: string
        scopes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ---- Dataset schemas ----
    Dataset:
      type: object
      required: [id, tenant_id, name, source_type, storage_path]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        source_type:
          $ref: "#/components/schemas/DatasetSourceType"
        schema_json:
          type: string
          deprecated: true
        columns:
          type: array
          items:
            $ref: "#/components/schemas/DatasetColumn"
        row_count:
          type: integer
          format: int64
        storage_path:
          type: string
        last_updated_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    DatasetSourceType:
      type: string
      enum: [tracker, parquet, import, transform]
    DatasetColumn:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
        nullable:
          type: boolean
        description:
          type: string
        semantic_type:
          $ref: "#/components/schemas/DatasetColumnSemanticType"
        tags:
          type: array
          items:
            type: string
        sample_values:
          type: array
          items: {}
        statistics:
          $ref: "#/components/schemas/ColumnStatistics"
    DatasetColumnSemanticType:
      type: string
      enum: [dimension, measure, timestamp, identifier]
    ColumnStatistics:
      type: object
      properties:
        min:
          type: string
        max:
          type: string
        null_rate:
          type: number
          format: double
        distinct_count:
          type: integer
          format: int64
    UpdateDatasetColumnsRequest:
      type: object
      required: [columns]
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/UpdateDatasetColumnRequest"
    UpdateDatasetColumnRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        semantic_type:
          $ref: "#/components/schemas/DatasetColumnSemanticType"
        tags:
          type: array
          items:
            type: string
    DatasetRowsResponse:
      type: object
      required: [columns, rows, total_rows, limit, offset]
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/DatasetColumn"
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        total_rows:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer

    # ---- Upload schemas ----
    UploadStatus:
      type: string
      enum: [presigned, uploaded]
    UploadFileInput:
      type: object
      required: [filename, content_type, size_bytes]
      properties:
        filename:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
          format: int64
    CreateUploadPresignRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/UploadFileInput"
          minItems: 1
          maxItems: 10
    UploadFilePresigned:
      type: object
      required: [file_id, filename, presigned_url, object_key]
      properties:
        file_id:
          type: string
        filename:
          type: string
        presigned_url:
          type: string
        object_key:
          type: string
        expires_at:
          type: string
          format: date-time
    CreateUploadPresignResponse:
      type: object
      required: [upload_id, files]
      properties:
        upload_id:
          type: string
        files:
          type: array
          items:
            $ref: "#/components/schemas/UploadFilePresigned"
    UploadFile:
      type: object
      required: [id, upload_id, file_name, object_key, content_type, size_bytes]
      properties:
        id:
          type: string
        upload_id:
          type: string
        file_name:
          type: string
        object_key:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
    Upload:
      type: object
      required: [id, tenant_id, status, files]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        status:
          $ref: "#/components/schemas/UploadStatus"
        files:
          type: array
          items:
            $ref: "#/components/schemas/UploadFile"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ---- Member schemas ----
    TenantRole:
      type: string
      enum: [owner, admin, member]
    TenantMember:
      type: object
      required: [user_id, email, display_name, role, joined_at]
      properties:
        user_id:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          $ref: "#/components/schemas/TenantRole"
        joined_at:
          type: string
          format: date-time
    TenantInvitation:
      type: object
      required: [id, tenant_id, email, role, status, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/TenantRole"
        token:
          type: string
          description: Invitation token (returned on creation only)
        status:
          type: string
          enum: [pending, accepted, expired]
        invited_by:
          type: string
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    CreateInvitationRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/TenantRole"
    UpdateMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/TenantRole"

    # ---- Plan & Usage schemas ----
    Plan:
      type: object
      required: [id, name, display_name, max_events_per_day, max_storage_bytes, max_rows_per_day, max_uploads_per_day, is_default]
      properties:
        id:
          type: string
        name:
          type: string
        display_name:
          type: string
        max_events_per_day:
          type: integer
        max_storage_bytes:
          type: integer
          format: int64
        max_rows_per_day:
          type: integer
        max_uploads_per_day:
          type: integer
        is_default:
          type: boolean
    TenantPlanResponse:
      type: object
      required: [plan, started_at]
      properties:
        plan:
          $ref: "#/components/schemas/Plan"
        started_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
    UsageSummaryResponse:
      type: object
      required: [date, events_count, storage_bytes, rows_count, uploads_count]
      properties:
        date:
          type: string
        events_count:
          type: integer
        storage_bytes:
          type: integer
          format: int64
        rows_count:
          type: integer
        uploads_count:
          type: integer
        plan:
          $ref: "#/components/schemas/Plan"
    CreatePlanRequest:
      type: object
      required: [name, display_name]
      properties:
        name:
          type: string
        display_name:
          type: string
        max_events_per_day:
          type: integer
          default: -1
        max_storage_bytes:
          type: integer
          format: int64
          default: -1
        max_rows_per_day:
          type: integer
          default: -1
        max_uploads_per_day:
          type: integer
          default: -1
    UpdatePlanRequest:
      type: object
      properties:
        display_name:
          type: string
        max_events_per_day:
          type: integer
        max_storage_bytes:
          type: integer
          format: int64
        max_rows_per_day:
          type: integer
        max_uploads_per_day:
          type: integer
    AssignPlanRequest:
      type: object
      required: [plan_id]
      properties:
        plan_id:
          type: string
    CreateBillingCheckoutSessionRequest:
      type: object
      required: [price_id]
      properties:
        price_id:
          type: string
        success_url:
          type: string
          format: uri
        cancel_url:
          type: string
          format: uri
    CreateBillingCheckoutSessionResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
    CreateBillingPortalSessionRequest:
      type: object
      properties:
        return_url:
          type: string
          format: uri
    CreateBillingPortalSessionResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
    BillingSubscriptionResponse:
      type: object
      required: [tenant_id, status]
      properties:
        tenant_id:
          type: string
        stripe_customer_id:
          type: string
        stripe_subscription_id:
          type: string
        stripe_price_id:
          type: string
        status:
          type: string
        current_period_end:
          type: string
          format: date-time
        plan:
          $ref: "#/components/schemas/Plan"
    BillingWebhookResponse:
      type: object
      required: [received]
      properties:
        received:
          type: boolean

    # ---- Transform schemas ----
    TransformValidateRequest:
      type: object
      required: [sql, dataset_ids]
      properties:
        sql:
          type: string
        dataset_ids:
          type: array
          items:
            type: string
    TransformValidateResponse:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
        error:
          type: string
        columns:
          type: array
          items:
            $ref: "#/components/schemas/DatasetColumn"
    TransformPreviewRequest:
      type: object
      required: [sql, dataset_ids]
      properties:
        sql:
          type: string
        dataset_ids:
          type: array
          items:
            type: string
        limit:
          type: integer
          default: 100
    TransformPreviewResponse:
      type: object
      required: [columns, rows, row_count]
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/DatasetColumn"
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        row_count:
          type: integer
    TransformExecution:
      type: string
      enum: [save_only, immediate, scheduled]
    CreateTransformJobRequest:
      type: object
      required: [name, slug, sql, dataset_ids]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        sql:
          type: string
        dataset_ids:
          type: array
          items:
            type: string
        execution:
          $ref: "#/components/schemas/TransformExecution"
        scheduled_at:
          type: string
          format: date-time
    CreateTransformJobResponse:
      type: object
      required: [job, version]
      properties:
        job:
          $ref: "#/components/schemas/Job"
        version:
          $ref: "#/components/schemas/JobVersion"
        job_run:
          $ref: "#/components/schemas/JobRun"
    # ---- Connection Schemas ----
    SchemaItem:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [sheet, table, view]
        metadata:
          type: object
          additionalProperties: true
    ConnectionSchemasResponse:
      type: object
      required: [title, items]
      properties:
        title:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/SchemaItem"
    # ---- Import Job ----
    ImportExecution:
      type: string
      enum: [save_only, immediate]
    CreateImportJobRequest:
      type: object
      required: [name, slug, connection_id]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        connection_id:
          type: string
        source_config:
          type: object
          additionalProperties: true
          description: Connector-specific source configuration (e.g. {spreadsheet_id, sheet_name, range} for Google Sheets)
        execution:
          $ref: "#/components/schemas/ImportExecution"
    CreateImportJobResponse:
      type: object
      required: [job, version]
      properties:
        job:
          $ref: "#/components/schemas/Job"
        version:
          $ref: "#/components/schemas/JobVersion"
        job_run:
          $ref: "#/components/schemas/JobRun"

    # ---- Write Key schemas ----
    WriteKey:
      type: object
      required: [id, tenant_id, name, key_prefix, is_active, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        key_prefix:
          type: string
          description: First 8 characters of the key for identification
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateWriteKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    CreateWriteKeyResponse:
      type: object
      required: [write_key, raw_key]
      properties:
        write_key:
          $ref: "#/components/schemas/WriteKey"
        raw_key:
          type: string
          description: Full write key value (shown only once)

    # ---- Collect schemas ----
    CollectEvent:
      type: object
      required: [event_id, event_name, event_time]
      properties:
        event_id:
          type: string
        event_name:
          type: string
        session_id:
          type: string
        properties:
          type: object
          additionalProperties: true
        event_time:
          type: string
          format: date-time
        context:
          type: object
          additionalProperties: true
    CollectEventsRequest:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/CollectEvent"
          minItems: 1
          maxItems: 100
    CollectEventsResponse:
      type: object
      required: [accepted, errors]
      properties:
        accepted:
          type: integer
        errors:
          type: integer

    # ---- Dashboard / Chart / Widget / TemplateRun ----
    ChartType:
      type: string
      enum: [line, bar, pie]
    ChartPeriod:
      type: string
      enum: [last_7_days, last_30_days, last_90_days, custom]
    TemplateRunStatus:
      type: string
      enum: [success, failed, skipped]

    Dashboard:
      type: object
      required: [id, tenant_id, name, created_at, updated_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Chart:
      type: object
      required: [id, tenant_id, name, chart_type, dataset_id, measure, dimension, created_at, updated_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        chart_type:
          $ref: "#/components/schemas/ChartType"
        dataset_id:
          type: string
        measure:
          type: string
        dimension:
          type: string
        config_json:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    DashboardWidget:
      type: object
      required: [id, dashboard_id, chart_id, position, created_at]
      properties:
        id:
          type: string
        dashboard_id:
          type: string
        chart_id:
          type: string
        position:
          type: integer
        created_at:
          type: string
          format: date-time
    TemplateRun:
      type: object
      required: [id, tenant_id, template_type, status, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        template_type:
          type: string
        status:
          $ref: "#/components/schemas/TemplateRunStatus"
        skip_reason:
          type: string
        dashboard_id:
          type: string
        created_at:
          type: string
          format: date-time
    ChartDataResponse:
      type: object
      required: [chart_id, period, labels, datasets]
      properties:
        chart_id:
          type: string
        period:
          $ref: "#/components/schemas/ChartPeriod"
        labels:
          type: array
          items:
            type: string
        datasets:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataset"
    ChartDataset:
      type: object
      required: [label, data]
      properties:
        label:
          type: string
        data:
          type: array
          items:
            type: number

    CreateDashboardRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
    UpdateDashboardRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
    CreateChartRequest:
      type: object
      required: [name, chart_type, dataset_id, measure, dimension]
      properties:
        name:
          type: string
        chart_type:
          $ref: "#/components/schemas/ChartType"
        dataset_id:
          type: string
        measure:
          type: string
        dimension:
          type: string
        config_json:
          type: string
    UpdateChartRequest:
      type: object
      required: [name, chart_type, dataset_id, measure, dimension]
      properties:
        name:
          type: string
        chart_type:
          $ref: "#/components/schemas/ChartType"
        dataset_id:
          type: string
        measure:
          type: string
        dimension:
          type: string
        config_json:
          type: string
    CreateDashboardWidgetRequest:
      type: object
      required: [chart_id, position]
      properties:
        chart_id:
          type: string
        position:
          type: integer
    CreateTemplateRunRequest:
      type: object
      required: [template_type]
      properties:
        template_type:
          type: string
