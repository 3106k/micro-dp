openapi: 3.0.3
info:
  title: micro-dp API
  version: 1.0.0
  description: |
    Contract-first API specification for micro-dp.
servers:
  - url: http://localhost:8080
tags:
  - name: health
  - name: auth
  - name: events
  - name: admin
  - name: plans
  - name: usage
  - name: billing
  - name: jobs
  - name: job_runs
  - name: module_types
  - name: connectors
  - name: connections
  - name: credentials
  - name: datasets
  - name: uploads
  - name: members
  - name: transform
  - name: import
  - name: write_keys
  - name: collect
  - name: dashboards
  - name: charts
  - name: template_runs
paths:
  /healthz:
    get:
      tags: [health]
      summary: Health check
      operationId: getHealthz
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: Register user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: Current user profile
      operationId: me
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/google/start:
    get:
      tags: [auth]
      summary: Start Google OAuth login
      operationId: startGoogleOAuth
      responses:
        "302":
          description: Redirect to Google OAuth consent page
          headers:
            Location:
              schema:
                type: string
                format: uri
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/google/callback:
    get:
      tags: [auth]
      summary: Handle Google OAuth callback
      operationId: callbackGoogleOAuth
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to app after login attempt
          headers:
            Location:
              schema:
                type: string
                format: uri
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  # ---- Events ----
  /api/v1/events:
    post:
      tags: [events]
      summary: Ingest event
      operationId: ingestEvent
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestEventRequest"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestEventResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "402":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/events/summary:
    get:
      tags: [events]
      summary: Event counts summary
      operationId: getEventsSummary
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      responses:
        "200":
          description: Event counts summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventsSummaryResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  # ---- Admin Tenants ----
  /api/v1/admin/tenants:
    post:
      tags: [admin]
      summary: Create tenant (superadmin only)
      operationId: adminCreateTenant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateTenantRequest"
      responses:
        "201":
          description: Created tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [admin]
      summary: List tenants (superadmin only)
      operationId: adminListTenants
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tenant"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/admin/tenants/{id}:
    patch:
      tags: [admin]
      summary: Update tenant (superadmin only)
      operationId: adminUpdateTenant
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateTenantRequest"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"

  # ---- Plan & Usage (tenant-scoped) ----
  /api/v1/plan:
    get:
      tags: [plans]
      summary: Get current tenant plan
      operationId: getTenantPlan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      responses:
        "200":
          description: Current plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantPlanResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/usage/summary:
    get:
      tags: [usage]
      summary: Get today's usage summary
      operationId: getUsageSummary
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      responses:
        "200":
          description: Usage summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageSummaryResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/billing/checkout-session:
    post:
      tags: [billing]
      summary: Create Stripe Checkout session
      operationId: createBillingCheckoutSession
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBillingCheckoutSessionRequest"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBillingCheckoutSessionResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "402":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/billing/portal-session:
    post:
      tags: [billing]
      summary: Create Stripe Billing Portal session
      operationId: createBillingPortalSession
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBillingPortalSessionRequest"
      responses:
        "200":
          description: Portal session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBillingPortalSessionResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/billing/subscription:
    get:
      tags: [billing]
      summary: Get current tenant billing subscription
      operationId: getBillingSubscription
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      responses:
        "200":
          description: Billing subscription state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSubscriptionResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/billing/webhook:
    post:
      tags: [billing]
      summary: Receive Stripe webhook events
      operationId: billingWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingWebhookResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  # ---- Transform ----
  /api/v1/transform/validate:
    post:
      tags: [transform]
      summary: Validate transform SQL
      operationId: transformValidate
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransformValidateRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransformValidateResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/transform/preview:
    post:
      tags: [transform]
      summary: Preview transform SQL results
      operationId: transformPreview
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransformPreviewRequest"
      responses:
        "200":
          description: Preview results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransformPreviewResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/transform/jobs:
    post:
      tags: [transform]
      summary: Create transform job
      operationId: createTransformJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransformJobRequest"
      responses:
        "201":
          description: Created transform job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTransformJobResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"

  # ---- Import ----
  /api/v1/import/jobs:
    post:
      tags: [import]
      summary: Create import job
      operationId: createImportJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateImportJobRequest"
      responses:
        "201":
          description: Created import job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateImportJobResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"

  # ---- Admin Plans ----
  /api/v1/admin/plans:
    post:
      tags: [admin]
      summary: Create plan (superadmin only)
      operationId: adminCreatePlan
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanRequest"
      responses:
        "201":
          description: Created plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [admin]
      summary: List plans (superadmin only)
      operationId: adminListPlans
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Plan"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/admin/plans/{id}:
    put:
      tags: [admin]
      summary: Update plan (superadmin only)
      operationId: adminUpdatePlan
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanRequest"
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/admin/tenants/{tenant_id}/plan:
    post:
      tags: [admin]
      summary: Assign plan to tenant (superadmin only)
      operationId: adminAssignPlan
      security:
        - bearerAuth: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignPlanRequest"
      responses:
        "200":
          description: Plan assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantPlanResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"

  # ---- Jobs ----
  /api/v1/jobs:
    post:
      tags: [jobs]
      summary: Create job
      operationId: createJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [jobs]
      summary: List jobs
      operationId: listJobs
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/jobs/{id}:
    get:
      tags: [jobs]
      summary: Get job
      operationId: getJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [jobs]
      summary: Update job
      operationId: updateJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobRequest"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"

  # ---- Job Versions ----
  /api/v1/jobs/{job_id}/versions:
    post:
      tags: [jobs]
      summary: Create job version (with modules and edges)
      operationId: createJobVersion
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobVersionRequest"
      responses:
        "201":
          description: Created job version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobVersion"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [jobs]
      summary: List job versions
      operationId: listJobVersions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of job versions
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobVersion"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/jobs/{job_id}/versions/{version_id}:
    get:
      tags: [jobs]
      summary: Get job version detail (with modules and edges)
      operationId: getJobVersionDetail
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: version_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobVersionDetail"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/jobs/{job_id}/versions/{version_id}/publish:
    post:
      tags: [jobs]
      summary: Publish job version
      operationId: publishJobVersion
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: version_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Published job version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobVersion"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"

  # ---- Job Runs ----
  /api/v1/job_runs:
    get:
      tags: [job_runs]
      summary: List job runs
      operationId: listJobRuns
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: List of job runs
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobRun"
        "401":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [job_runs]
      summary: Create job run
      operationId: createJobRun
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRunRequest"
      responses:
        "201":
          description: Created job run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobRun"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/job_runs/{id}:
    get:
      tags: [job_runs]
      summary: Get job run by ID
      operationId: getJobRun
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobRun"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"

  # ---- Job Run Modules ----
  /api/v1/job_runs/{job_run_id}/modules:
    get:
      tags: [job_runs]
      summary: List modules for a job run
      operationId: listJobRunModules
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
        - name: job_run_id
          in: path
          required: true
